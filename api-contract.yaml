        "404":
          description: 讨论不存在

  # ==========================================================
  # 5. 收尾总结
  # ==========================================================
  /discussions/{discussion_id}/summary:
    get:
      tags: [Summary]
      summary: 查询已有总结
      description: 获取上次生成的总结。若从未生成过则返回 404。
      operationId: getSummary
      parameters:
        - $ref: "#/components/parameters/DiscussionIdPath"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SummaryResponse"
        "404":
          description: 尚未生成总结
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "SUMMARY_NOT_FOUND"
                message: "该讨论尚未生成总结，请先调用 POST 生成"

    post:
      tags: [Summary]
      summary: 生成收尾总结
      description: |
        调用 DeepSeek 基于全部发言、共识、分歧生成 Markdown 格式的讨论总结。
        生成后讨论状态自动变更为 `completed`。幂等设计：再次调用会基于最新数据重新生成并覆盖旧总结。
      operationId: generateSummary
      parameters:
        - $ref: "#/components/parameters/DiscussionIdPath"
      responses:
        "200":
          description: 生成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SummaryResponse"
        "400":
          description: 讨论无发言数据
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "NO_SPEECHES"
                message: "该讨论尚无任何发言，无法生成总结"
        "404":
          description: 讨论不存在
        "502":
          description: DeepSeek 调用失败
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "AI_SERVICE_UNAVAILABLE"
                message: "DeepSeek 服务暂时不可用，请稍后重试"

# ============================================================
# 全局错误码汇总（附录）
# ============================================================
# 用 x- 扩展字段记录非规范性信息
x-error-codes:
  description: 所有可能的错误码一览
  codes:
    VALIDATION_ERROR:
      status: 400
      message: 请求参数格式或取值不合法
    DISCUSSION_NOT_FOUND:
      status: 404
      message: 讨论会话不存在
    PANELIST_NOT_FOUND:
      status: 404
      message: 嘉宾不存在或不属于该讨论
    SUMMARY_NOT_FOUND:
      status: 404
      message: 总结尚未生成
    BUSINESS_CONFLICT:
      status: 400
      message: 业务规则冲突（如重复主持人）
    DISCUSSION_COMPLETED:
      status: 400
      message: 讨论已结束不可操作
    NO_PANELISTS:
      status: 400
      message: 无嘉宾，先生成嘉宾阵容
    NO_EXPERTS:
      status: 400
      message: 至少需要一位专家嘉宾
    NO_SPEECHES:
      status: 400
      message: 无发言数据
    SPEECH_IN_PROGRESS:
      status: 409
      message: 已有发言生成中，请等待完成
    AI_GENERATION_FAILED:
      status: 502
      message: DeepSeek 生成失败
    AI_SERVICE_UNAVAILABLE:
      status: 502
      message: DeepSeek 服务不可用
    INTERNAL_ERROR:
      status: 500
      message: 服务器内部错误

x-sse-event-reference:
  description: SSE 事件类型完整清单
  events:
    - event: speech.chunk
      direction: server → client
      trigger: AI 生成发言过程中，每产生一个 token
      payload: SSEChunkPayload { sequence_num, delta, panelist_id? }
    - event: speech.complete
      direction: server → client
      trigger: 一句完整发言生成完毕并入库存
      payload: Speech (完整)
    - event: consensus.update
      direction: server → client
      trigger: 新增或更新共识点
      payload: ConsensusPoint (完整)
    - event: divergence.update
      direction: server → client
      trigger: 新增或更新分歧点
      payload: DivergencePoint (完整)
    - event: error
      direction: server → client
      trigger: 流内异常（生成失败、超时等）
      payload: SSEErrorPayload { code, message }
    - event: heartbeat
      direction: server → client
      trigger: 15 秒无任何业务事件
      payload: "{}"
